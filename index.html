<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Attendance Analytics</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f6fa;
    }
    .chat-container {
      width: 400px;
      height: 600px;
      background: #fff;
      margin: 40px auto;
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .chat-header {
      padding: 15px;
      background: #4a69bd;
      color: white;
      border-radius: 10px 10px 0 0;
    }
    .chat-body {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }
    .msg {
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 75%;
    }
    .user {
      background: #dff9fb;
      align-self: flex-end;
    }
    .bot {
      background: #f1f2f6;
      align-self: flex-start;
    }
    .chat-footer {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
    }
    input {
      flex: 1;
      padding: 8px;
    }
    button {
      padding: 8px 12px;
      background: #4a69bd;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    🤖 AI Attendance Assistant
  </div>

  <div class="chat-body" id="chat-body"></div>

  <div class="chat-footer">
    <input id="chat-inp" placeholder="Ask something..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
function addMsg(role, text){
  const chat = document.getElementById("chat-body");

  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMsg(){
  const inp = document.getElementById("chat-inp");
  const message = inp.value.trim();
  if(!message) return;

  inp.value = "";
  addMsg("user", message);

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: message,
        stats: {},

        // Official API integration
        externalApi: {
          useOfficialApi: true,
          school_code: "10010301101",
          date: "2026-04-10"
        }
      })
    });

    const data = await res.json();

    if(data.reply){
      addMsg("bot", data.reply);
    } else {
      addMsg("bot", "⚠️ AI error");
    }

  } catch (err) {
    addMsg("bot", "⚠️ Server not reachable");
  }
}
</script>

</body>
</html>
